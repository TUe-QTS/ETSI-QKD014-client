[package]
name = "etsi014-client"
version = "0.1.2"
edition = "2021"
description = "ETSI GS QKD 014 client library"
readme = "../README.md"
repository = "https://github.com/TUe-QTS/ETSI-QKD014-client"
keywords = ["etsi", "qkd"]
categories = ["api-bindings", "cryptography"]
license = "MIT"
rust-version = "1.74.1"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
base64ct = { version = "1.8.0", features = ["alloc"] }
libc = "0.2.175"
reqwest = { version = "0.12.13", features = ["native-tls"] }
secrets = "1.2.0"
serde = { version = "1.0.225", features = ["derive"] }
serde_json = "1.0.145"
tokio = "1.47.1"
url = "2.5.7"

[build-dependencies]
cbindgen = "0.28.0"

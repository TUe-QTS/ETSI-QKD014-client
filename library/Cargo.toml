[package]
name = "etsi014-client"
version = "0.1.2"
edition = "2024"
description = "ETSI GS QKD 014 client library"
readme = "../README.md"
repository = "https://github.com/TUe-QTS/ETSI-QKD014-client"
keywords = ["etsi", "qkd"]
categories = ["api-bindings", "cryptography"]
license = "MIT"
rust-version = "1.85.0"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
base64ct = { version = "1.8.3", features = ["alloc"] }
libc = "0.2.186"
reqwest = { version = "0.13.4", features = ["native-tls"] }
secrets = "1.3.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tokio = "1.52.3"
url = "2.5.8"

[build-dependencies]
cbindgen = "0.29.3"
